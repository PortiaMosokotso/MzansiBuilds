<div class="create-project-page">

  <div class="project-card">

    <!-- Header with logo -->
    <div class="header">
      <img src="Images/MzansiLogo.png" alt="MzansiBuilds Logo" class="logo"/>
      <div>
        <h1>Create New Project</h1>
        <p>Share what you're building, request support, and track milestones publicly.</p>
      </div>
    </div>

    <!-- Project Title -->
    <div class="form-row">
      <label>Project Title <span class="required">*</span></label>
      <div>
        <input
          type="text"
          placeholder="Enter project title"
          [(ngModel)]="title"
        />
      </div>
    </div>

    <!-- Description -->
    <div class="form-row">
      <label>Description <span class="required">*</span></label>
      <div>
        <textarea
          placeholder="Describe what you're building"
          [(ngModel)]="description"
          rows="4"
        ></textarea>
      </div>
    </div>

    <!-- Project Stage -->
    <div class="form-row">
      <label>Project Stage <span class="required">*</span></label>
      <div>
        <select [(ngModel)]="stage" (ngModelChange)="stage = +$event">
          <option [value]="0">Planning</option>
          <option [value]="1">In Progress</option>
          <option [value]="2">Testing</option>
          <option [value]="3">Completed</option>
        </select>
      </div>
    </div>

    <!-- Support Required (Toggle) -->
    <div class="form-row">
      <label>Support Required?</label>
      <div class="toggle-row">
        <button
          class="toggle-btn"
          [class.toggle-on]="supportRequired"
          (click)="supportRequired = !supportRequired"
        >
          <span class="toggle-knob"></span>
        </button>
        <span class="toggle-label">
          {{ supportRequired ? 'Yes, I need collaborators' : 'No support needed' }}
        </span>
      </div>
    </div>

    <!-- Support Details (Conditional) -->
    @if (supportRequired) {
      <div class="form-row">
        <label>Support Details</label>
        <div>
          <textarea
            placeholder="Explain the support needed"
            [(ngModel)]="supportDetails"
            rows="3"
          ></textarea>
        </div>
      </div>
    }

    <!-- Buttons -->
    <div class="button-row">
      <button class="btn-secondary" (click)="cancel()">Cancel</button>
      <button class="btn-primary" (click)="createProject()">Create Project</button>
   
    </div>

  </div>

</div>
