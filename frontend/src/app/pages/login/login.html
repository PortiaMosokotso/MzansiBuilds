<div class="login-page">
  <div class="login-card">
    <img src="Images/MzansiLogo.png" alt="MzansiBuilds Logo" class="logo" />
    <h1>Welcome Back</h1>
    <p class="subtitle">Build in public. Collaborate. Celebrate milestones.</p>

    <form #loginForm="ngForm" (ngSubmit)="login(loginForm)" novalidate>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          name="email"
          type="email"
          placeholder="Enter your email"
          [(ngModel)]="email"
          #emailRef="ngModel"
          required
          email
          [class.input-error]="emailRef.invalid && emailRef.touched"
        />
        <div class="error-msg" *ngIf="emailRef.invalid && emailRef.touched">
          <span *ngIf="emailRef.errors?.['required']">Email is required.</span>
          <span *ngIf="emailRef.errors?.['email']">Enter a valid email address.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Enter your password"
          [(ngModel)]="password"
          #passwordRef="ngModel"
          required
          minlength="6"
          [class.input-error]="passwordRef.invalid && passwordRef.touched"
        />
        <div class="error-msg" *ngIf="passwordRef.invalid && passwordRef.touched">
          <span *ngIf="passwordRef.errors?.['required']">Password is required.</span>
          <span *ngIf="passwordRef.errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>

      <div class="error-msg server-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>

    </form>

    <p class="register-link">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
