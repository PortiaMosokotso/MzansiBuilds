<div class="login-page">
  <div class="login-card">
    <img src="Images/MzansiLogo.png" alt="MzansiBuilds Logo" class="logo" />

    <h1>Welcome Back</h1>
    <p class="subtitle">
      Build in public. Collaborate. Celebrate milestones.
    </p>

    <!-- EMAIL -->
    <div class="form-group">
      <label>Email Address</label>
      <input
        [(ngModel)]="email"
        name="email"
        type="email"
        placeholder="Enter your email"
        required
        #emailRef="ngModel"
        [class.invalid]="emailRef.invalid && emailRef.touched"
      />

      <small class="error" *ngIf="emailRef.invalid && emailRef.touched">
        Email is required
      </small>
    </div>

    <!-- PASSWORD -->
    <div class="form-group">
      <label>Password</label>
      <input
        [(ngModel)]="password"
        name="password"
        type="password"
        placeholder="Enter your password"
        required
        minlength="4"
        #passwordRef="ngModel"
        [class.invalid]="passwordRef.invalid && passwordRef.touched"
      />

      <small class="error" *ngIf="passwordRef.invalid && passwordRef.touched">
        Password is required (min 4 characters)
      </small>
    </div>

    <button
      (click)="login()"
      [disabled]="!email || !password"
    >
      Login
    </button>

    <p class="register-link">
      Don’t have an account?
      <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
