<div class="dashboard-layout">
  <aside class="sidebar" *ngIf="isLoggedIn()">
    <div class="logo-section">
      <img src="Images/MzansiLogo.png" alt="MzansiBuilds" />
      <h2>MzansiBuilds</h2>
    </div>
    <nav>
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a routerLink="/projects" routerLinkActive="active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7h18M3 12h18M3 17h12"/>
        </svg>
        My Projects
      </a>
      <a routerLink="/collaboration-requests" routerLinkActive="active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        Requests
      </a>
      <a routerLink="/celebration-wall" routerLinkActive="active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
        Celebration Wall
      </a>
      <a routerLink="/feed" routerLinkActive="active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 11a9 9 0 019 9M4 4a16 16 0 0116 16"/>
          <circle cx="5" cy="19" r="1" fill="currentColor"/>
        </svg>
        Live Feed
      </a>

      <div class="sidebar-divider"></div>

      <a class="logout-link" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </a>
    </nav>
  </aside>

  <main class="dashboard-content">
    <router-outlet></router-outlet>
  </main>
</div>
