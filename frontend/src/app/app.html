<div class="dashboard-layout">
  <!-- Sidebar: only show if logged in -->
  <aside class="sidebar" *ngIf="isLoggedIn()">
    <div class="logo-section">
      <img src="Images/MzansiLogo.png" alt="MzansiBuilds" />
      <h2>MzansiBuilds</h2>
    </div>

    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/projects" routerLinkActive="active">My Projects</a>
      <a>Live Feed</a>
      <a>Collaboration</a>
      <a routerLink="/celebration-wall" routerLinkActive="nav-active" class="nav-item">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="2">
    <path d="M6 9H4a2 2 0 01-2-2V5a2 2 0 012-2h2"/>
    <path d="M18 9h2a2 2 0 002-2V5a2 2 0 00-2-2h-2"/>
    <path d="M6 2h12v7a6 6 0 01-12 0V2z"/>
    <path d="M12 15v4M8 19h8"/>
  </svg>
  Celebration Wall
</a>
      <a (click)="logout()">Logout</a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="dashboard-content">
    <router-outlet></router-outlet>
  </main>
</div>
